<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OysterApp</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .btn { padding: 12px; background: #0078d4; color: white; border-radius: 6px; display: inline-block; margin: 10px 0; }
    </style>
</head>
<body>

    <!-- ホーム画面 -->
    <div id="home" class="screen active">
        <h1>OysterApp</h1>
       <div class="btn" onclick="showLaneList(); showScreen('laneList')">レーン一覧を見る</div>

        <div class="btn" onclick="showScreen('register')">バスケット登録</div>
    </div>

    <!-- レーン一覧 -->
    <div id="laneList" class="screen">
        <h2>レーン一覧</h2>
        <div class="btn" onclick="showScreen('home')">戻る</div>
    </div>

    <!-- 登録画面 -->
<div id="register" class="screen">
    <h2>バスケット登録</h2>

    <label>レーン番号</label>
    <input id="lane" type="number" min="1" max="8">

    <label>バスケット数</label>
    <input id="basketCount" type="number">

    <label>種類（A〜D）</label>
    <select id="species">
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
    </select>

    <label>重量（g）</label>
    <input id="weight" type="number">

    <label>数量</label>
    <input id="quantity" type="number">

    <div class="btn" onclick="registerBasket()">保存する</div>
    <div class="btn" onclick="showScreen('home')">戻る</div>
</div>
<!-- レーン詳細画面 -->
<div id="laneDetail" class="screen">
    <h2 id="laneDetailTitle">レーン詳細</h2>
    <div id="laneDetailItems"></div>
    <div class="btn" onclick="showScreen('laneList')">戻る</div>
</div>


    <script>
        // 画面切り替え
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // データ保存
        function saveRecord(record) {
            const key = "oyster_records";
            const data = JSON.parse(localStorage.getItem(key)) || [];
            data.push(record);
            localStorage.setItem(key, JSON.stringify(data));
        }

        // 登録処理
      function registerBasket() {
    const key = "oyster_records";
    let data = JSON.parse(localStorage.getItem(key)) || [];

    if (window.editingId) {
        // 編集モード
        data = data.map(item => {
            if (item.id === window.editingId) {
                return {
                    ...item,
                    lane: Number(document.getElementById("lane").value),
                    basketCount: Number(document.getElementById("basketCount").value),
                    species: document.getElementById("species").value,
                    weight: Number(document.getElementById("weight").value),
                    quantity: Number(document.getElementById("quantity").value)
                };
            }
            return item;
        });

        localStorage.setItem(key, JSON.stringify(data));
        alert("更新しました");

        // 編集IDをクリア
        window.editingId = null;

        // window.currentLaneNumber = laneNumber;
        showLaneDetail(window.currentLaneNumber);

    } else {
        // 新規登録
        const record = {
            id: Date.now(),
            date: new Date().toISOString().split("T")[0],
            lane: Number(document.getElementById("lane").value),
            basketCount: Number(document.getElementById("basketCount").value),
            species: document.getElementById("species").value,
            weight: Number(document.getElementById("weight").value),
            quantity: Number(document.getElementById("quantity").value)
        };

        data.push(record);
        localStorage.setItem(key, JSON.stringify(data));
        alert("保存しました");
    }
}


        // バックアップ生成
        function createBackup() {
            const key = "oyster_records";
            const data = localStorage.getItem(key);
            if (!data) return;

            const date = new Date().toISOString().split("T")[0];
            const filename = `backup-${date}.json`;

            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            a.click();

            URL.revokeObjectURL(url);
        }

        // バックアップ復元
        function restoreBackup(jsonText) {
            localStorage.setItem("oyster_records", jsonText);
            alert("バックアップを復元しました");
        }

        // PWA Service Worker 登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.error('SW fail', err));
        }
    // レーン一覧をレーン番号ごとにまとめて表示
function showLaneList() {
    const key = "oyster_records";
    const data = JSON.parse(localStorage.getItem(key)) || [];

    const container = document.getElementById("laneList");
    container.innerHTML = `
        <h2>レーン一覧</h2>
        <div id="laneItems"></div>
        <div class="btn" onclick="showScreen('home')">戻る</div>
    `;

    const list = document.getElementById("laneItems");

    if (data.length === 0) {
        list.innerHTML = "<p>まだデータがありません。</p>";
        return;
    }

    // ★ レーン番号ごとにグループ化
    const grouped = {};
    data.forEach(item => {
        if (!grouped[item.lane]) grouped[item.lane] = [];
        grouped[item.lane].push(item);
    });

   // ★ レーン番号順に表示
Object.keys(grouped).sort((a, b) => a - b).forEach(lane => {
    const items = grouped[lane];

    // ★ 合計数量・合計重量（g → kg）
    const totalQuantity = items.reduce((sum, i) => sum + i.quantity, 0);

    const totalWeightGram = items.reduce((sum, i) => sum + (i.weight * i.quantity), 0);
    const totalWeightKg = (totalWeightGram / 1000).toFixed(1);

    // ★ 種類別合計
    const speciesTotals = { A: 0, B: 0, C: 0, D: 0 };
    items.forEach(i => {
        speciesTotals[i.species] += i.quantity;
    });

    const laneBox = document.createElement("div");
    laneBox.style.padding = "10px";
    laneBox.style.margin = "15px 0";

        laneBox.style.background = "#e0e0e0";
        laneBox.style.borderRadius = "6px";

laneBox.innerHTML = `
    <h3 style="cursor:pointer; color:#0078d4;" onclick="showLaneDetail(${lane})">
        レーン ${lane}
    </h3>
    <p><strong>合計数量:</strong> ${totalQuantity}</p>
    <p><strong>合計重量:</strong> ${totalWeightKg} kg</p>

    <p><strong>種類別合計</strong></p>
    <p>A: ${speciesTotals.A}</p>
    <p>B: ${speciesTotals.B}</p>
    <p>C: ${speciesTotals.C}</p>
    <p>D: ${speciesTotals.D}</p>
`;

        // ★ 内訳を表示
        items.forEach(item => {
            const div = document.createElement("div");
            div.style.padding = "10px";
            div.style.margin = "10px 0";
            div.style.background = "#fff";
            div.style.borderRadius = "6px";
            div.innerHTML = `
                <strong>${item.date}</strong><br>
                種類: ${item.species} / 重量: ${item.weight}g / 数量: ${item.quantity}
            `;
            laneBox.appendChild(div);
        });

        list.appendChild(laneBox);
    });
}
function showLaneDetail(laneNumber) {
    const key = "oyster_records";
    const data = JSON.parse(localStorage.getItem(key)) || [];

    // このレーンのデータだけ抽出
    const items = data.filter(item => item.lane === laneNumber);

    // タイトル更新
    document.getElementById("laneDetailTitle").innerText = `レーン ${laneNumber} の詳細`;

    const container = document.getElementById("laneDetailItems");
    container.innerHTML = "";

    if (items.length === 0) {
        container.innerHTML = "<p>データがありません。</p>";
        return;
    }

    // ★ 日付ごとにグループ化
    const groupedByDate = {};
    items.forEach(item => {
        if (!groupedByDate[item.date]) groupedByDate[item.date] = [];
        groupedByDate[item.date].push(item);
    });

    // ★ 日付順に表示
    Object.keys(groupedByDate).sort().forEach(date => {
        const dateBox = document.createElement("div");
        dateBox.style.padding = "10px";
        dateBox.style.margin = "15px 0";
        dateBox.style.background = "#e0e0e0";
        dateBox.style.borderRadius = "6px";

        dateBox.innerHTML = `<h3>${date}</h3>`;

        groupedByDate[date].forEach(item => {
            const div = document.createElement("div");
            div.style.padding = "10px";
            div.style.margin = "10px 0";
            div.style.background = "#fff";
            div.style.borderRadius = "6px";

            div.innerHTML = `
    種類: ${item.species}<br>
    重量: ${item.weight}g<br>
    数量: ${item.quantity}<br>
    バスケット数: ${item.basketCount}<br><br>

    <button onclick="editRecord(${item.id})">編集</button>
    <button onclick="deleteRecord(${item.id})" style="margin-left:10px; color:red;">削除</button>
`;


            dateBox.appendChild(div);
        });

        container.appendChild(dateBox);
    });

    // 詳細画面へ切り替え
    showScreen("laneDetail");
}


function deleteRecord(id) {
    const key = "oyster_records";
    let data = JSON.parse(localStorage.getItem(key)) || [];

     // ★ 削除前の確認ダイアログ
    if (!confirm("本当に削除しますか？")) {
        return; // キャンセルしたら何もしない
    }
// id が一致するものを除外
    data = data.filter(item => item.id !== id);

    localStorage.setItem(key, JSON.stringify(data));

    alert("削除しました");

    // 削除後にレーン詳細を更新
    const laneNumber = window.currentLaneNumber;
    showLaneDetail(laneNumber);
}
function editRecord(id) {
    const key = "oyster_records";
    const data = JSON.parse(localStorage.getItem(key)) || [];

    const item = data.find(i => i.id === id);
    if (!item) return;

    // 編集対象のIDを保持
    window.editingId = id;

    // 登録画面に値をセット
    document.getElementById("lane").value = item.lane;
    document.getElementById("basketCount").value = item.basketCount;
    document.getElementById("species").value = item.species;
    document.getElementById("weight").value = item.weight;
    document.getElementById("quantity").value = item.quantity;

    // 登録画面へ移動
    showScreen("register");
}

</script>

</body>
</html>
